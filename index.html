<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Serverless Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0f19; color: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #111827; border: 1px solid #1f2937; padding: 25px; border-radius: 12px; width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h3 { margin-top: 0; color: #38bdf8; text-align: center; }
        .section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #1f2937; }
        input, textarea { width: 100%; padding: 10px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 10px; background: #0284c7; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #0369a1; }
        #chatBox { height: 200px; overflow-y: auto; background: #030712; padding: 10px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #1f2937; }
        .msg { margin-bottom: 8px; font-size: 14px; }
        .me { color: #38bdf8; }
        .friend { color: #34d399; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h3>🌐 Direct Peer Chat</h3>
    
    <div id="setupSection">
        <div class="section">
            <p style="font-size: 12px; margin: 0 0 10px 0; color: #9ca3af;">1. Apna code generate karein aur dost ko bhejein:</p>
            <button onclick="createOffer()">Step 1: Code Banayein</button>
            <textarea id="localCode" rows="3" readonly placeholder="Aapka code yahan dikhega..." style="margin-top: 10px; resize: none; font-size: 11px;"></textarea>
        </div>

        <div class="section">
            <p style="font-size: 12px; margin: 0 0 10px 0; color: #9ca3af;">2. Apne dost ka code yahan paste karein:</p>
            <textarea id="remoteCode" rows="3" placeholder="Dost ka code yahan daalein..." style="resize: none; font-size: 11px;"></textarea>
            <button onclick="connectToPeer()" style="background: #16a34a;">Step 2: Connect Karein</button>
        </div>
    </div>

    <div id="chatSection" class="hidden">
        <div id="chatBox"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="msgInput" placeholder="Message likho..." onkeypress="if(event.key === 'Enter') sendMsg()">
            <button onclick="sendMsg()" style="width: auto; margin: 0; padding: 0 20px;">Send</button>
        </div>
    </div>
</div>

<script>
    // WebRTC connection config (Free public STUN server for routing)
    const peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    let dataChannel;

    // Jab local ice candidate milega, tab textarea me code update hoga
    peerConnection.onicecandidate = e => {
        if (!e.candidate) {
            document.getElementById('localCode').value = btoa(JSON.stringify(peerConnection.localDescription));
        }
    };

    // Jab dost se data channel receive ho (Receiver side)
    peerConnection.ondatachannel = e => {
        dataChannel = e.channel;
        setupDataChannel();
    };

    // Chat start karne ke liye offer generate karna (Sender Side)
    async function createOffer() {
        dataChannel = peerConnection.createDataChannel("chat");
        setupDataChannel();
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
    }

    // Dost ka code accept karna aur connect karna
    async function connectToPeer() {
        const remoteValue = document.getElementById('remoteCode').value.trim();
        if (!remoteValue) return alert("Pehle dost ka code daalo!");
        
        const desc = new RTCSessionDescription(JSON.parse(atob(remoteValue)));
        await peerConnection.setRemoteDescription(desc);

        // Agar saamne wale ne offer bheja tha, toh hum answer generate karenge
        if (desc.type === 'offer') {
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
        }
    }

    // Data channel ke events manage karna
    function setupDataChannel() {
        dataChannel.onopen = () => {
            document.getElementById('setupSection').classList.add('hidden');
            document.getElementById('chatSection').classList.remove('hidden');
        };
        dataChannel.onmessage = e => appendMessage(e.data, 'friend');
    }

    // Message send karne ka function
    function sendMsg() {
        const input = document.getElementById('msgInput');
        if (input.value.trim() === "" || !dataChannel || dataChannel.readyState !== "open") return;
        
        dataChannel.send(input.value);
        appendMessage(input.value, 'me');
        input.value = '';
    }

    // Chat UI me message jodna
    function appendMessage(text, sender) {
        const chatBox = document.getElementById('chatBox');
        const name = sender === 'me' ? 'You' : 'Friend';
        chatBox.innerHTML += `<div class="msg"><span class="${sender}">${name}:</span> ${text}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
