<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Net Premium</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #0a0f1d 0%, #020610 100%);
            --neon-blue: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(0, 210, 255, 0.15);
            --glass-blur: blur(25px);
            --neon-glow: 0 10px 30px rgba(0, 210, 255, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg-gradient); color: #f8fafc; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        .bg-bubbles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; margin: 0; padding: 0;
        }
        .bg-bubbles li {
            position: absolute; list-style: none; display: block; width: 30px; height: 30px; background-color: rgba(0, 210, 255, 0.04);
            bottom: -100px; border-radius: 50%; animation: bubble-up 15s linear infinite;
        }
        .bg-bubbles li:nth-child(1) { left: 15%; width: 60px; height: 60px; }
        .bg-bubbles li:nth-child(2) { left: 45%; width: 25px; height: 25px; animation-duration: 12s; }
        .bg-bubbles li:nth-child(3) { left: 80%; width: 40px; height: 40px; }
        @keyframes bubble-up {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-1100px); opacity: 0; }
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020610;
            display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.3s ease;
        }
        .spinner {
            width: 45px; height: 45px; border: 3px solid rgba(0, 210, 255, 0.1);
            border-radius: 50%; border-top-color: var(--neon-blue); animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile Frame Layout */
        .app-frame {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); width: 90%; max-width: 360px; height: 82vh; max-height: 640px;
            border-radius: 28px; box-shadow: var(--neon-glow); z-index: 10; display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        .app-content { flex: 1; padding: 22px; overflow-y: auto; display: flex; flex-direction: column; }
        .screen { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .center-screen { justify-content: center; align-items: center; text-align: center; }

        h2 { margin-top: 0; margin-bottom: 24px; color: #fff; font-size: 22px; font-weight: 600; text-shadow: 0 0 8px rgba(0, 210, 255, 0.3); }

        .input-group { width: 100%; margin-bottom: 14px; text-align: left; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; }
        input, textarea {
            width: 100%; padding: 12px 14px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08);
            color: white; border-radius: 12px; font-size: 14px; box-sizing: border-box; transition: 0.2s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--neon-blue); background: rgba(255, 255, 255, 0.07); }

        .btn-neon {
            width: 100%; padding: 13px; background: linear-gradient(135deg, rgba(0, 210, 255, 0.8), rgba(0, 90, 255, 0.8));
            color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s;
        }
        .btn-neon:hover { transform: translateY(-1px); }
        .error-msg { color: #ff5555; font-size: 12px; margin-top: 8px; text-align: center; }

        /* Glassmorphic Navbar */
        .bubble-navbar {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(0, 210, 255, 0.15); padding: 10px 24px; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-item { color: #64748b; cursor: pointer; padding: 10px; border-radius: 50%; transition: 0.2s; display: flex; }
        .nav-item:hover, .nav-item.active { color: var(--neon-blue); background: rgba(0, 210, 255, 0.08); }

        /* Profile Style Sheets */
        .profile-pic-container { position: relative; width: 80px; height: 80px; margin: 0 auto 12px auto; }
        .profile-avatar {
            width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #00d2ff, #0055ff);
            display: flex; justify-content: center; align-items: center; font-weight: 600; color: white; font-size: 24px; overflow: hidden;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Interactive Swipeable Notification Banner */
        .push-notification {
            position: absolute; top: -100px; left: 5%; width: 90%; 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 210, 255, 0.25); border-radius: 16px; padding: 12px;
            display: flex; align-items: center; gap: 12px; z-index: 2000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.2s ease, opacity 0.2s ease;
            cursor: grab; user-select: none;
        }
        .push-notification.show { top: 15px; }

        .bottom-sheet {
            position: absolute; bottom: -100%; left: 0; width: 100%; background: rgba(10, 15, 30, 0.98); backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border); border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 20px; z-index: 100;
            transition: bottom 0.3s ease;
        }
        .bottom-sheet.open { bottom: 0; }
        .sheet-btn {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; color: white; cursor: pointer; text-align: center; margin-bottom: 8px;
        }

        .search-row-item {
            display: flex; align-items: center; gap: 12px; padding: 10px; background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.2s;
        }
        .search-row-item:hover { background: rgba(0, 210, 255, 0.05); border-color: rgba(0, 210, 255, 0.2); }

        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .msg-bubble { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; max-width: 75%; font-size: 13px; word-break: break-all; }
        .msg-send { background: var(--neon-blue); color: #000; align-self: flex-end; margin-left: auto; }
        .msg-receive { background: rgba(255,255,255,0.08); color: #fff; align-self: flex-start; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <ul class="bg-bubbles"><li></li><li></li><li></li></ul>
    <div id="loader"><div class="spinner"></div></div>

    <div class="app-frame" id="mainAppFrame">
        
        <div id="toastNotification" class="push-notification" onmousedown="startSwipe(event)" ontouchstart="startSwipe(event)">
            <div id="toastPfp" style="width:36px; height:36px; border-radius:50%; background:var(--neon-blue); display:flex; justify-content:center; align-items:center; font-weight:600; font-size:12px; color:#fff; overflow:hidden;"></div>
            <div style="flex:1; overflow:hidden;">
                <h4 id="toastName" style="margin:0; font-size:13px; color:#fff;">Sender</h4>
                <p id="toastText" style="margin:2px 0 0 0; font-size:11px; color:#94a3b8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Message text...</p>
            </div>
        </div>

        <div class="app-content">
            
            <div id="loginScreen" class="screen center-screen">
                <h2>Portal Login</h2>
                <div class="input-group">
                    <label>Username (small letters only)</label>
                    <input type="text" id="loginUser" placeholder="e.g. reurge" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="••••••••">
                </div>
                <button class="btn-neon" onclick="executePortalAuth()">Enter Dashboard</button>
                <div id="loginError" class="error-msg"></div>
            </div>

            <div id="dashboardScreen" class="screen hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
                    <h3 id="panelTitle" style="margin:0; color:var(--neon-blue); font-size:17px;">Home</h3>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <span id="globalTag" style="font-size:11px; background:rgba(0,210,255,0.08); padding:3px 8px; border-radius:8px;">@user</span>
                        <i data-lucide="log-out" style="width: 14px; height: 14px; color: #ff5555; cursor: pointer;" onclick="logoutSession()"></i>
                    </div>
                </div>
                <div id="subViewContent" style="flex:1; overflow-y:auto; display: flex; flex-direction: column;"></div>
            </div>

            <div id="editProfileScreen" class="screen hidden">
                <h3 style="margin:0 0 16px 0; color:var(--neon-blue); font-size:17px; text-align: center;">Edit Profile</h3>
                <div class="input-group"><label>Display Name</label><input type="text" id="editName"></div>
                <div class="input-group"><label>Username</label><input type="text" id="editUsername"></div>
                <div class="input-group"><label>Password</label><input type="password" id="editPassword"></div>
                <div class="input-group"><label>Bio</label><textarea id="editBio" rows="2"></textarea></div>
                <button class="btn-neon" onclick="commitProfileChanges()">Save & Apply</button>
                <button class="btn-neon" onclick="dismissEditScreen()" style="background:transparent; border:1px solid rgba(255,255,255,0.1); margin-top:6px; color:#94a3b8;">Cancel</button>
                <div id="editError" class="error-msg"></div>
            </div>

        </div>

        <div id="appNavbar" class="bubble-navbar hidden">
            <div class="nav-item active" onclick="switchActiveTab('home', this)"><i data-lucide="home"></i></div>
            <div class="nav-item" onclick="switchActiveTab('chat', this)"><i data-lucide="message-square"></i></div>
            <div class="nav-item" onclick="switchActiveTab('search', this)"><i data-lucide="search"></i></div>
            <div class="nav-item" onclick="switchActiveTab('profile', this)"><i data-lucide="user"></i></div>
        </div>

        <div id="photoSheet" class="bottom-sheet">
            <div class="sheet-btn" onclick="triggerDeviceGallery()">Set New Profile</div>
            <div class="sheet-btn" style="color:#ff5555;" onclick="purgeAvatarGraphic()">Remove Profile</div>
            <div class="sheet-btn" onclick="hideActionSheet()" style="background:transparent; border:none; margin-top:4px;">Close</div>
        </div>
        <input type="file" id="deviceGalleryInput" accept="image/*" class="hidden" onchange="processSelectedImage(event)">
    </div>

<script>
    const lowerCaseAlphaRegex = /^[a-z]+$/;
    let operatingUserKey = "";
    let temporaryEditBase64Image = "";
    let activeChatTarget = ""; 
    let toastTimeoutTracker = null;

    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 300);
        }, 1000);
        lucide.createIcons();
        
        // Mock default clean structural database indices matching query filters
        if(!localStorage.getItem('bubble_db_user_reurge')) {
            localStorage.setItem('bubble_db_user_reurge', JSON.stringify({username:"reurge",password:"123",displayName:"Reurge Core",bio:"Testing parameters system.",image:"",followers:5}));
            localStorage.setItem('bubble_db_user_reurges', JSON.stringify({username:"reurges",password:"123",displayName:"Reurge Tech",bio:"Secondary system storage mirror.",image:"",followers:12}));
        }

        const savedSession = localStorage.getItem('active_bubble_session');
        if (savedSession) restoreUserWorkspace(savedSession);
    });

    function executePortalAuth() {
        const userVal = document.getElementById('loginUser').value.trim().toLowerCase();
        const passVal = document.getElementById('loginPass').value;
        const errBox = document.getElementById('loginError');
        errBox.innerText = "";

        if (!lowerCaseAlphaRegex.test(userVal) || userVal.length < 2 || userVal.length > 10) {
            errBox.innerText = "Error: Username must be 2-10 small letters only!"; return;
        }
        if (!passVal) return errBox.innerText = "Error: Password is required!";

        const dynamicDbMeta = localStorage.getItem(`bubble_db_user_${userVal}`);

        if (dynamicDbMeta === null) {
            // New profiles set default strictly to 0 followers
            const newUser = { username: userVal, password: passVal, displayName: userVal, bio: "Hello world!", image: "", followers: 0 };
            localStorage.setItem(`bubble_db_user_${userVal}`, JSON.stringify(newUser));
            saveSessionAndLaunch(userVal);
        } else {
            const activeProfile = JSON.parse(dynamicDbMeta);
            if (activeProfile.password === passVal) saveSessionAndLaunch(userVal);
            else errBox.innerText = "Error: Password mismatch.";
        }
    }

    function saveSessionAndLaunch(username) {
        localStorage.setItem('active_bubble_session', username);
        restoreUserWorkspace(username);
    }

    function restoreUserWorkspace(username) {
        operatingUserKey = username;
        document.getElementById('globalTag').innerText = `@${username}`;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('dashboardScreen').classList.remove('hidden');
        document.getElementById('appNavbar').classList.remove('hidden');
        switchActiveTab('home', document.querySelector('.nav-item'));
    }

    function logoutSession() {
        localStorage.removeItem('active_bubble_session');
        document.getElementById('dashboardScreen').classList.add('hidden');
        document.getElementById('appNavbar').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
    }

    function switchActiveTab(targetTabId, viewNodeElement) {
        if(viewNodeElement) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            viewNodeElement.classList.add('active');
        }
        document.getElementById('panelTitle').innerText = targetTabId.charAt(0).toUpperCase() + targetTabId.slice(1);
        const viewPort = document.getElementById('subViewContent');
        const activeProfileData = JSON.parse(localStorage.getItem(`bubble_db_user_${operatingUserKey}`));

        // Reset tracking so notifications function across all components cleanly
        if(targetTabId !== 'chat') activeChatTarget = "";

        if (targetTabId === 'home') {
            viewPort.innerHTML = `<p style="color:#94a3b8; font-size:13px;">Welcome back, <b>${activeProfileData.displayName}</b>.</p>`;
        } else if (targetTabId === 'chat') {
            renderChatInboxList(viewPort);
        } else if (targetTabId === 'search') {
            viewPort.innerHTML = `
                <div class="input-group"><input type="text" id="globalSearchInput" placeholder="Search (e.g. r)..." oninput="handleSmartLiveSearch(this.value)"></div>
                <div id="globalSearchResultsContainer"></div>
            `;
        } else if (targetTabId === 'profile') {
            renderUserProfile(operatingUserKey, viewPort, true);
        }
        lucide.createIcons();
    }

    // Smart Prefix Parser Auto Search Logic Engine
    function handleSmartLiveSearch(query) {
        const container = document.getElementById('globalSearchResultsContainer');
        const cleanQuery = query.trim().toLowerCase();
        container.innerHTML = "";
        if (!cleanQuery) return;

        let matches = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('bubble_db_user_')) {
                const username = key.replace('bubble_db_user_', '');
                if (username.startsWith(cleanQuery)) {
                    matches.push(JSON.parse(localStorage.getItem(key)));
                }
            }
        }

        const topMatches = matches.slice(0, 5);

        if (topMatches.length > 0) {
            topMatches.forEach(profile => {
                // Fixed: Search now displays accurate actual user profile image avatars (PFP)
                const avatarIcon = profile.image ? `<img src="${profile.image}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">` : profile.displayName.substring(0,2).toUpperCase();
                container.innerHTML += `
                    <div class="search-row-item" onclick="handleSearchResultTap('${profile.username}')">
                        <div style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg, #00d2ff, #0055ff); display:flex; justify-content:center; align-items:center; font-size:12px; font-weight:600; overflow:hidden;">${avatarIcon}</div>
                        <div>
                            <h4 style="margin:0; font-size:14px; color:#fff;">${profile.displayName}</h4>
                            <p style="margin:1px 0 0 0; font-size:11px; color:var(--neon-blue);">@${profile.username}</p>
                        </div>
                    </div>
                `;
            });
        } else {
            container.innerHTML = `<p style="font-size:13px; color:#64748b; text-align:center; margin-top:15px;">No result found for "${query}"</p>`;
        }
    }

    function handleSearchResultTap(targetUsername) {
        const viewPort = document.getElementById('subViewContent');
        if (targetUsername === operatingUserKey) {
            switchActiveTab('profile', document.querySelectorAll('.nav-item')[3]);
        } else {
            document.getElementById('panelTitle').innerText = "User Profile";
            renderUserProfile(targetUsername, viewPort, false);
        }
    }

    function renderUserProfile(username, targetContainer, isOwnProfile) {
        const userObj = JSON.parse(localStorage.getItem(`bubble_db_user_${username}`));
        const currentImgDisplay = userObj.image ? `<img src="${userObj.image}">` : userObj.displayName.substring(0,2).toUpperCase();
        
        const followFlagKey = `follow_${operatingUserKey}_to_${username}`;
        const isFollowin = localStorage.getItem(followFlagKey) !== null;
        const followBtnText = isFollowing ? "Following" : "Follow";

        let actionControlBlock = `<button class="btn-neon" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); box-shadow:none;" onclick="displayProfileConfigurator()">Edit Profile</button>`;
        
        if (!isOwnProfile) {
            actionControlBlock = `
                <div style="display:flex; gap:8px; width:100%;">
                    <button class="btn-neon" id="followBtnAction" style="${isFollowing?'background:rgba(255,255,255,0.1);box-shadow:none;':''}" onclick="toggleFollowTarget('${username}')">${followBtnText}</button>
                    <button class="btn-neon" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); box-shadow:none;" onclick="openDirectChatArea('${username}')">Message</button>
                </div>
            `;
        }

        targetContainer.innerHTML = `
            <div style="text-align:center; margin-top:10px;">
                <div class="profile-pic-container" ${isOwnProfile?'onclick="revealActionSheet()"':''}>
                    <div class="profile-avatar" id="profileViewAvatarNode">${currentImgDisplay}</div>
                    ${isOwnProfile?'<div style="position:absolute; bottom:0; right:0; background:var(--neon-blue); border-radius:50%; width:22px; height:22px; display:flex; justify-content:center; align-items:center;"><i data-lucide="camera" style="width:11px; height:11px; color:#000;"></i></div>':''}
                </div>
                <h3 style="margin:0 0 2px 0; color:#fff; font-size:18px;">${userObj.displayName}</h3>
                <p style="margin:0 0 10px 0; font-size:12px; color:#64748b;">@${userObj.username}</p>
                <p style="font-size:12px; margin:0 0 14px 0; color:var(--neon-blue);"><b><span id="followerCountNode">${userObj.followers || 0}</span></b> Followers</p>
                <p style="margin:0 auto 20px auto; font-size:13px; color:#94a3b8; max-width:240px; background:rgba(255,255,255,0.01); padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.03); word-break:break-word;">${userObj.bio}</p>
                ${actionControlBlock}
            </div>
        `;
        lucide.createIcons();
    }

    function toggleFollowTarget(targetUsername) {
        const followFlagKey = `follow_${operatingUserKey}_to_${targetUsername}`;
        const userObj = JSON.parse(localStorage.getItem(`bubble_db_user_${targetUsername}`));
        const followBtn = document.getElementById('followBtnAction');
        const countNode = document.getElementById('followerCountNode');

        if (localStorage.getItem(followFlagKey) === null) {
            localStorage.setItem(followFlagKey, "true");
            userObj.followers = (userObj.followers || 0) + 1;
            followBtn.innerText = "Following";
            followBtn.style.background = "rgba(255,255,255,0.1)"; followBtn.style.boxShadow = "none";
        } else {
            localStorage.removeItem(followFlagKey);
            userObj.followers = Math.max(0, (userObj.followers || 0) - 1);
            followBtn.innerText = "Follow";
            followBtn.style.background = "linear-gradient(135deg, rgba(0, 210, 255, 0.8), rgba(0, 90, 255, 0.8))";
        }
        localStorage.setItem(`bubble_db_user_${targetUsername}`, JSON.stringify(userObj));
        countNode.innerText = userObj.followers; // Fixed: Counter changes instantly in runtime view
    }

    // Messaging Engine Pipeline & Toaster Notification Core
    function openDirectChatArea(targetUsername) {
        activeChatTarget = targetUsername;
        document.getElementById('panelTitle').innerText = `Chat: @${targetUsername}`;
        const viewPort = document.getElementById('subViewContent');
        
        viewPort.innerHTML = `
            <div class="chat-container">
                <div class="chat-messages" id="chatMsgFlowBox"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="liveChatInput" placeholder="Message..." onkeypress="if(event.key==='Enter') dispatchLiveMsg()">
                    <button class="btn-neon" style="width:auto; padding:0 16px;" onclick="dispatchLiveMsg()"><i data-lucide="send" style="width:16px; height:16px;"></i></button>
                </div>
            </div>
        `;
        lucide.createIcons();
        reloadChatMessageNodeList();
    }

    function dispatchLiveMsg() {
        const input = document.getElementById('liveChatInput');
        const text = input.value.trim();
        if(!text) return;

        const chatRoomId = [operatingUserKey, activeChatTarget].sort().join('_log_');
        let chatHistory = JSON.parse(localStorage.getItem(`chat_history_${chatRoomId}`)) || [];
        
        chatHistory.push({ sender: operatingUserKey, text: text, timestamp: Date.now() });
        localStorage.setItem(`chat_history_${chatRoomId}`, JSON.stringify(chatHistory));
        
        input.value = "";
        reloadChatMessageNodeList();

        // Automated Response Simulation triggering dynamic interactive push alerts
        setTimeout(() => {
            if(activeChatTarget === 'reurge' || activeChatTarget === 'reurges') {
                const incomingMessageText = `Hey! Received your text: "${text}".`;
                chatHistory.push({ sender: activeChatTarget, text: incomingMessageText, timestamp: Date.now() });
                localStorage.setItem(`chat_history_${chatRoomId}`, JSON.stringify(chatHistory));
                
                // If the user has the target chat room currently active, append text directly
                if (activeChatTarget !== "") {
                    reloadChatMessageNodeList();
                }
                
                // Trigger Top Push Notification Toast Banner
                launchDynamicToastAlert(activeChatTarget, incomingMessageText);
            }
        }, 1200);
    }

    function reloadChatMessageNodeList() {
        const box = document.getElementById('chatMsgFlowBox');
        if(!box) return; box.innerHTML = "";
        const chatRoomId = [operatingUserKey, activeChatTarget].sort().join('_log_');
        const chatHistory = JSON.parse(localStorage.getItem(`chat_history_${chatRoomId}`)) || [];

        chatHistory.forEach(msg => {
            const cls = msg.sender === operatingUserKey ? 'msg-send' : 'msg-receive';
            box.innerHTML += `<div class="msg-bubble ${cls}">${msg.text}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    function renderChatInboxList(targetContainer) {
        targetContainer.innerHTML = `<p style="font-size:12px; color:#64748b; text-align:center; margin-top:15px; margin-bottom:10px;">Active Channels</p><div id="inboxList"></div>`;
        const listContainer = document.getElementById('inboxList');
        
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('chat_history_')) {
                const roomClean = key.replace('chat_history_', '');
                if (roomClean.includes(operatingUserKey)) {
                    const targetFriend = roomClean.replace(operatingUserKey, '').replace('_log_', '');
                    const friendMeta = JSON.parse(localStorage.getItem(`bubble_db_user_${targetFriend}`));
                    if (friendMeta) {
                        // Fixed: Display name takes priority on inbox list view with accurate PFPs alongside
                        const inboxImgNode = friendMeta.image ? `<img src="${friendMeta.image}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">` : friendMeta.displayName.substring(0,2).toUpperCase();
                        listContainer.innerHTML += `
                            <div class="search-row-item" onclick="openDirectChatArea('${targetFriend}')">
                                <div style="width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg, #a855f7, #6b21a8); display:flex; justify-content:center; align-items:center; font-size:11px; font-weight:600; overflow:hidden;">${inboxImgNode}</div>
                                <div style="font-weight:600; font-size:14px; color:#fff;">${friendMeta.displayName}</div>
                            </div>
                        `;
                    }
                }
            }
        }
    }

    // Sliding / Swipable Banner Notification Logic Implementation
    function launchDynamicToastAlert(senderUsername, messageBodyText) {
        const toast = document.getElementById('toastNotification');
        const tPfp = document.getElementById('toastPfp');
        const tName = document.getElementById('toastName');
        const tText = document.getElementById('toastText');

        const senderData = JSON.parse(localStorage.getItem(`bubble_db_user_${senderUsername}`));
        if(!senderData) return;

        tName.innerText = senderData.displayName; // Display Name shown
        tText.innerText = messageBodyText;
        tPfp.innerHTML = senderData.image ? `<img src="${senderData.image}" style="width:100%; height:100%; object-fit:cover;">` : senderData.displayName.substring(0,2).toUpperCase();

        // Clear ongoing animations pointers
        clearTimeout(toastTimeoutTracker);
        toast.style.transform = "translateX(0px)";
        toast.style.opacity = "1";
        toast.classList.add('show');

        // Automatically slide up after exactly 1.5 seconds default frame duration
        toastTimeoutTracker = setTimeout(() => {
            dismissToastNotificationBanner();
        }, 1500);
    }

    function dismissToastNotificationBanner() {
        const toast = document.getElementById('toastNotification');
        toast.classList.remove('show');
    }

    // Touch Swipe Motion Controller (Left/Right dismiss action metrics)
    let touchStartX = 0; let touchMoveX = 0; let isSwipingActive = false;

    function startSwipe(e) {
        isSwipingActive = true;
        touchStartX = e.clientX || e.touches[0].clientX;
        document.onmousemove = processSwipe; document.ontouchmove = processSwipe;
        document.onmouseup = terminateSwipe; document.ontouchend = terminateSwipe;
    }
    function processSwipe(e) {
        if(!isSwipingActive) return;
        const currentX = e.clientX || e.touches[0].clientX;
        touchMoveX = currentX - touchStartX;
        if(Math.abs(touchMoveX) > 10) {
            const toast = document.getElementById('toastNotification');
            toast.style.transform = `translateX(${touchMoveX}px)`;
            toast.style.opacity = `${1 - Math.abs(touchMoveX)/200}`;
        }
    }
    function terminateSwipe() {
        isSwipingActive = false;
        document.onmousemove = null; document.ontouchmove = null;
        const toast = document.getElementById('toastNotification');
        if(Math.abs(touchMoveX) > 80) {
            dismissToastNotificationBanner(); // Dismiss if swiped past threshold layout boundary
        } else {
            toast.style.transform = "translateX(0px)"; toast.style.opacity = "1"; // Bounce back inside viewport
        }
        touchMoveX = 0;
    }

    // Profile Metadata Persistence Modifiers
    function displayProfileConfigurator() {
        document.getElementById('dashboardScreen').classList.add('hidden');
        document.getElementById('appNavbar').classList.add('hidden');
        document.getElementById('editProfileScreen').classList.remove('hidden');
        const currentCachedData = JSON.parse(localStorage.getItem(`bubble_db_user_${operatingUserKey}`));
        document.getElementById('editName').value = currentCachedData.displayName;
        document.getElementById('editUsername').value = currentCachedData.username;
        document.getElementById('editPassword').value = currentCachedData.password;
        document.getElementById('editBio').value = currentCachedData.bio;
        temporaryEditBase64Image = currentCachedData.image || "";
    }

    function dismissEditScreen() {
        document.getElementById('editProfileScreen').classList.add('hidden');
        document.getElementById('dashboardScreen').classList.remove('hidden');
        document.getElementById('appNavbar').classList.remove('hidden');
        switchActiveTab('profile', document.querySelectorAll('.nav-item')[3]);
    }

    function commitProfileChanges() {
        const targetName = document.getElementById('editName').value.trim();
        const targetUser = document.getElementById('editUsername').value.trim().toLowerCase();
        const targetPass = document.getElementById('editPassword').value;
        const targetBio = document.getElementById('editBio').value.trim();
        const errNode = document.getElementById('editError');

        if (!targetName) return errNode.innerText = "Error: Display Name empty!";
        if (!lowerCaseAlphaRegex.test(targetUser) || targetUser.length < 2 || targetUser.length > 10) {
            return errNode.innerText = "Error: Username invalid (2-10 small letters only)!";
        }
        if (!targetPass) return errNode.innerText = "Error: Password mandatory!";

        if (targetUser !== operatingUserKey) {
            if (localStorage.getItem(`bubble_db_user_${targetUser}`) !== null) {
                return errNode.innerText = "Error: Username already token!";
            }
            localStorage.removeItem(`bubble_db_user_${operatingUserKey}`);
        }

        const currentCachedData = JSON.parse(localStorage.getItem(`bubble_db_user_${operatingUserKey}`)) || {};
        const updatedSchema = {
            username: targetUser, password: targetPass, displayName: targetName,
            bio: targetBio || "Active on Bubble Net Platform.", image: temporaryEditBase64Image,
            followers: currentCachedData.followers || 0
        };

        localStorage.setItem(`bubble_db_user_${targetUser}`, JSON.stringify(updatedSchema));
        operatingUserKey = targetUser;
        localStorage.setItem('active_bubble_session', targetUser);
        dismissEditScreen();
    }

    function revealActionSheet() { document.getElementById('photoSheet').classList.add('open'); }
    function hideActionSheet() { document.getElementById('photoSheet').classList.remove('open'); }
    function triggerDeviceGallery() { document.getElementById('deviceGalleryInput').click(); }

    function processSelectedImage(evt) {
        const imgFile = evt.target.files[0];
        if (imgFile) {
            const streamReader = new FileReader();
            streamReader.onload = function(e) {
                const b64DataStr = e.target.result;
                temporaryEditBase64Image = b64DataStr;
                const parsed = JSON.parse(localStorage.getItem(`bubble_db_user_${operatingUserKey}`));
                parsed.image = b64DataStr;
                localStorage.setItem(`bubble_db_user_${operatingUserKey}`, JSON.stringify(parsed));
                document.getElementById('profileViewAvatarNode').innerHTML = `<img src="${b64DataStr}">`;
                hideActionSheet();
            };
            streamReader.readAsDataURL(imgFile);
        }
    }

    function purgeAvatarGraphic() {
        temporaryEditBase64Image = "";
        const parsed = JSON.parse(localStorage.getItem(`bubble_db_user_${operatingUserKey}`));
        parsed.image = "";
        localStorage.setItem(`bubble_db_user_${operatingUserKey}`, JSON.stringify(parsed));
        document.getElementById('profileViewAvatarNode').innerHTML = parsed.displayName.substring(0,2).toUpperCase();
        hideActionSheet();
    }
</script>
