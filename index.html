<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Net Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #0a0f1d 0%, #020610 100%);
            --neon-blue: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(0, 210, 255, 0.15);
            --glass-blur: blur(20px);
            --neon-glow: 0 10px 30px rgba(0, 210, 255, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg-gradient);
            color: #f8fafc;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Ambient Floating Bubbles */
        .bg-bubbles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: 1; margin: 0; padding: 0;
        }
        .bg-bubbles li {
            position: absolute; list-style: none; display: block;
            width: 30px; height: 30px; background-color: rgba(0, 210, 255, 0.05);
            bottom: -100px; border-radius: 50%; animation: bubble-up 15s linear infinite;
        }
        .bg-bubbles li:nth-child(1) { left: 15%; width: 60px; height: 60px; animation-delay: 0s; }
        .bg-bubbles li:nth-child(2) { left: 35%; width: 25px; height: 25px; animation-delay: 3s; animation-duration: 12s; }
        .bg-bubbles li:nth-child(3) { left: 75%; width: 50px; height: 50px; animation-delay: 1s; }
        .bg-bubbles li:nth-child(4) { left: 85%; width: 70px; height: 70px; animation-duration: 18s; }
        @keyframes bubble-up {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 50%; }
            100% { transform: translateY(-1100px) rotate(360deg); opacity: 0; border-radius: 30%; }
        }

        /* 1-Second Bootstrap Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020610; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.3s ease;
        }
        .spinner {
            width: 45px; height: 45px; border: 3px solid rgba(0, 210, 255, 0.1);
            border-radius: 50%; border-top-color: var(--neon-blue);
            animation: spin 1s linear infinite; box-shadow: 0 0 12px rgba(0, 210, 255, 0.4);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Central Standardized Mobile Frame */
        .app-frame {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            width: 90%; max-width: 360px;
            height: 82vh; max-height: 640px;
            border-radius: 28px; box-shadow: var(--neon-glow);
            z-index: 10; display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        .app-content { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; }
        .screen { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .center-screen { justify-content: center; align-items: center; text-align: center; }

        h2 {
            margin-top: 0; margin-bottom: 24px; color: #fff; font-size: 22px; font-weight: 600;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.3); text-align: center;
        }

        /* Premium Input Styles */
        .input-group { width: 100%; margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea {
            width: 100%; padding: 12px 14px; background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08); color: white;
            border-radius: 12px; font-size: 14px; transition: 0.2s; box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none; border-color: var(--neon-blue);
            background: rgba(255, 255, 255, 0.07); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }
        textarea { resize: none; font-family: inherit; }

        /* Action Glass Button */
        .btn-neon {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.8), rgba(0, 90, 255, 0.8));
            color: white; border: none; border-radius: 12px;
            cursor: pointer; font-weight: 600; font-size: 14px;
            box-shadow: 0 4px 12px rgba(0, 90, 255, 0.3); transition: 0.2s;
        }
        .btn-neon:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0, 210, 255, 0.5); }
        .error-msg { color: #ff5555; font-size: 12px; margin-top: 8px; text-align: center; font-weight: 500; }

        /* Ultimate Glassmorphic Bottom Navigation Bar */
        .bubble-navbar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(0, 210, 255, 0.15);
            padding: 10px 24px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.3);
        }
        .nav-item {
            color: #64748b; cursor: pointer; padding: 10px;
            border-radius: 50%; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center;
        }
        .nav-item:hover, .nav-item.active {
            color: var(--neon-blue); background: rgba(0, 210, 255, 0.08);
            transform: translateY(-2px); text-shadow: 0 0 8px rgba(0, 210, 255, 0.6);
        }

        /* Profile System Graphics */
        .profile-pic-container { position: relative; width: 85px; height: 85px; margin: 0 auto 16px auto; cursor: pointer; }
        .profile-avatar {
            width: 100%; height: 100%; border-radius: 50%;
            background: linear-gradient(135deg, #00d2ff, #0055ff);
            display: flex; justify-content: center; align-items: center;
            font-weight: 600; color: white; font-size: 28px;
            border: 2px solid rgba(0, 210, 255, 0.2); overflow: hidden;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Slide-Up Ultra Glass Sheet */
        .bottom-sheet {
            position: absolute; bottom: -100%; left: 0; width: 100%;
            background: rgba(10, 15, 30, 0.96); backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border);
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 20px; box-sizing: border-box; z-index: 100;
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
        }
        .bottom-sheet.open { bottom: 0; }
        .sheet-btn {
            width: 100%; padding: 13px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
            color: white; font-weight: 500; margin-bottom: 10px; cursor: pointer; text-align: center;
        }
        .sheet-btn.danger { color: #ff5555; border-color: rgba(255, 85, 85, 0.2); }
        .sheet-btn:active { background: rgba(255,255,255,0.08); }

        .hidden { display: none !important; }

        /* Global Search Element Cards */
        .search-result-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(0, 210, 255, 0.1);
            border-radius: 16px; padding: 16px; text-align: center; margin-top: 15px;
            box-shadow: var(--neon-glow); animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .chat-row {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            background: rgba(255,255,255,0.01); border-radius: 12px; margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.04);
        }
    </style>
</head>
<body>

    <ul class="bg-bubbles"><li></li><li></li><li></li><li></li></ul>

    <div id="loader"><div class="spinner"></div></div>

    <div class="app-frame">
        <div class="app-content">
            
            <div id="loginScreen" class="screen center-screen">
                <h2>Portal Login</h2>
                <div class="input-group">
                    <label>Username (small letters only)</label>
                    <input type="text" id="loginUser" placeholder="e.g. rjdev" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="••••••••">
                </div>
                <button class="btn-neon" onclick="executePortalAuth()">Access Dashboard</button>
                <div id="loginError" class="error-msg"></div>
            </div>

            <div id="dashboardScreen" class="screen hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <h3 id="panelTitle" style="margin:0; color:var(--neon-blue); font-size:18px;">Home</h3>
                    <div style="display: flex; gap: 6px; align-items: center;">
                        <span id="globalTag" style="font-size:11px; background:rgba(0,210,255,0.08); padding:3px 8px; border-radius:8px; border:1px solid rgba(0,210,255,0.2);">@user</span>
                        <i data-lucide="log-out" style="width: 14px; height: 14px; color: #ff5555; cursor: pointer;" onclick="logoutSession()"></i>
                    </div>
                </div>
                <div id="subViewContent" style="flex:1; overflow-y:auto;"></div>
            </div>

            <div id="editProfileScreen" class="screen hidden">
                <h3 style="margin:0 0 16px 0; color:var(--neon-blue); font-size:18px; text-align: center;">Edit Profile</h3>
                <div class="input-group">
                    <label>Display Name</label>
                    <input type="text" id="editName">
                </div>
                <div class="input-group">
                    <label>Username (small letters only)</label>
                    <input type="text" id="editUsername">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="editPassword">
                </div>
                <div class="input-group">
                    <label>Bio</label>
                    <textarea id="editBio" rows="2" placeholder="Tell us about yourself..."></textarea>
                </div>
                <button class="btn-neon" onclick="commitProfileChanges()">Save & Apply</button>
                <button class="btn-neon" onclick="dismissEditScreen()" style="background:transparent; border:1px solid rgba(255,255,255,0.1); box-shadow:none; margin-top:8px; color:#94a3b8;">Cancel</button>
                <div id="editError" class="error-msg"></div>
            </div>

        </div>

        <div id="appNavbar" class="bubble-navbar hidden">
            <div class="nav-item active" onclick="switchActiveTab('home', this)"><i data-lucide="home"></i></div>
            <div class="nav-item" onclick="switchActiveTab('chat', this)"><i data-lucide="message-square"></i></div>
            <div class="nav-item" onclick="switchActiveTab('search', this)"><i data-lucide="search"></i></div>
            <div class="nav-item" onclick="switchActiveTab('profile', this)"><i data-lucide="user"></i></div>
        </div>

        <div id="photoSheet" class="bottom-sheet">
            <div style="width:40px; height:4px; background:rgba(255,255,255,0.2); border-radius:2px; margin: 0 auto 15px auto;"></div>
            <div class="sheet-btn" onclick="triggerDeviceGallery()">Set New Profile</div>
            <div class="sheet-btn danger" onclick="purgeAvatarGraphic()">Remove Current Profile</div>
            <div class="sheet-btn" onclick="hideActionSheet()" style="background:transparent; border:none; margin-top:5px; color:#64748b;">Close</div>
        </div>
        
        <input type="file" id="deviceGalleryInput" accept="image/*" class="hidden" onchange="processSelectedImage(event)">
    </div>

<script>
    // Security RegEx Engine Core
    const lowerCaseAlphaRegex = /^[a-z]+$/;
    
    // Live Memory Cache Buffers
    let operatingUserKey = "";
    let temporaryEditBase64Image = ""; 

    // Bootstrap Validation On Load
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 300);
        }, 1000);
        lucide.createIcons();
        
        // Persistent Auto-Login Verification Logic Check
        const savedSession = localStorage.getItem('active_bubble_session');
        if (savedSession) {
            restoreUserWorkspace(savedSession);
        }
    });

    // Handle Authentication Request
    function executePortalAuth() {
        const userVal = document.getElementById('loginUser').value.trim();
        const passVal = document.getElementById('loginPass').value;
        const errBox = document.getElementById('loginError');
        errBox.innerText = "";

        if (!lowerCaseAlphaRegex.test(userVal) || userVal.length < 2 || userVal.length > 10) {
            errBox.innerText = "Error: Username must be 2-10 small letters only!";
            return;
        }
        if (!passVal) { return errBox.innerText = "Error: Password cannot be blank!"; }

        const dynamicDbMeta = localStorage.getItem(`bubble_db_user_${userVal}`);

        if (dynamicDbMeta === null) {
            // Register Brand New Data Profile Record Block
            const newUserProfileSchema = {
                username: userVal, password: passVal, displayName: userVal,
                bio: "Hello, I am using Bubble Net!", image: ""
            };
            localStorage.setItem(`bubble_db_user_${userVal}`, JSON.stringify(newUserProfileSchema));
            saveSessionAndLaunch(userVal);
        } else {
            // Read and Verify Authentication Credentials Matched
            const activeProfile = JSON.parse(dynamicDbMeta);
            if (activeProfile.password === passVal) {
                saveSessionAndLaunch(userVal);
            } else {
                errBox.innerText = "Error: Incorrect password mismatch.";
            }
        }
    }

    function saveSessionAndLaunch(username) {
        localStorage.setItem('active_bubble_session', username);
        restoreUserWorkspace(username);
    }

    function restoreUserWorkspace(username) {
        operatingUserKey = username;
        const userData = JSON.parse(localStorage.getItem(`bubble_db_user_${username}`));
        temporaryEditBase64Image = userData.image || "";

        document.getElementById('globalTag').innerText = `@${username}`;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('dashboardScreen').classList.remove('hidden');
        document.getElementById('appNavbar').classList.remove('hidden');
        
        switchActiveTab('home', document.querySelector('.nav-item'));
    }

    function logoutSession() {
        localStorage.removeItem('active_bubble_session');
        operatingUserKey = "";
        document.getElementById('dashboardScreen').classList.add('hidden');
        document.getElementById('appNavbar').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('loginUser').value = "";
        document.getElementById('loginPass').value = "";
    }

    // Interactive Router Engine Navigation Panel Controller
    function switchActiveTab(targetTabId, viewNodeElement) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if (viewNodeElement) viewNodeElement.classList.add('active');

        document.getElementById('panelTitle').innerText = targetTabId.charAt(0).toUpperCase() + targetTabId.slice(1);
        const viewPort = document.getElementById('subViewContent');
        const activeProfileData = JSON.parse(localStorage.getItem(`bubble_db_user_${operatingUserKey}`));

        if (targetTabId === 'home') {
            viewPort.innerHTML = `
                <p style="color:#94a3b8; font-size:13px; line-height:1.5;">Welcome back, <b>${activeProfileData.displayName}</b>.</p>
                <div style="background:rgba(255,255,255,0.01); padding:14px; border:1px solid rgba(255,255,255,0.04); border-radius:14px; margin-top:10px;">
                    <h4 style="margin:0 0 4px 0; font-size:14px; color:#fff;">Status Panel</h4>
                    <p style="margin:0; font-size:12px; color:#34d399;">● Core Environment Encrypted</p>
                </div>
            `;
        } else if (targetTabId === 'chat') {
            viewPort.innerHTML = `
                <div class="chat-row"><div style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#00d2ff,#0055ff)"></div><div><h5 style="margin:0; font-size:14px;">Alex</h5><p style="margin:2px 0 0 0; font-size:11px; color:#64748b;">The design parameters look clean.</p></div></div>
            `;
        } else if (targetTabId === 'search') {
            viewPort.innerHTML = `
                <div class="input-group">
                    <input type="text" id="globalSearchInput" placeholder="Enter target username..." oninput="handleGlobalLiveQuery(this.value)">
                </div>
                <div id="globalSearchResultsContainer"></div>
            `;
        } else if (targetTabId === 'profile') {
            const currentImgDisplay = activeProfileData.image ? `<img src="${activeProfileData.image}">` : activeProfileData.displayName.substring(0,2).toUpperCase();
            viewPort.innerHTML = `
                <div style="text-align:center; margin-top:10px;">
                    <div class="profile-pic-container" onclick="revealActionSheet()">
                        <div class="profile-avatar" id="profileViewAvatarNode">${currentImgDisplay}</div>
                        <div style="position:absolute; bottom:0; right:0; background:var(--neon-blue); border-radius:50%; width:24px; height:24px; display:flex; justify-content:center; align-items:center; border:2px solid #0f172a;"><i data-lucide="camera" style="width:12px; height:12px; color:#000;"></i></div>
                    </div>
                    <h3 style="margin:0 0 4px 0; color:#fff; font-size:18px;">${activeProfileData.displayName}</h3>
                    <p style="margin:0 0 16px 0; font-size:12px; color:#64748b;">@${activeProfileData.username}</p>
                    <p style="margin:0 auto 20px auto; font-size:13px; color:#94a3b8; max-width:240px; background:rgba(255,255,255,0.01); padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.03); word-break:break-word;">${activeProfileData.bio}</p>
                    <button class="btn-neon" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); box-shadow:none; font-size:13px; padding:10px;" onclick="displayProfileConfigurator()">Edit Profile</button>
                </div>
            `;
        }
        lucide.createIcons();
    }

    // Dynamic Live Query Search Engine Implementation
    function handleGlobalLiveQuery(queryRaw) {
        const container = document.getElementById('globalSearchResultsContainer');
        const queryClean = queryRaw.trim().toLowerCase();
        container.innerHTML = "";

        if (!queryClean) return;

        const prospectiveUserKey = `bubble_db_user_${queryClean}`;
        const queryMatchData = localStorage.getItem(prospectiveUserKey);

        if (queryMatchData) {
            const profileMatchedObj = JSON.parse(queryMatchData);
            const cardImgNode = profileMatchedObj.image ? `<img src="${profileMatchedObj.image}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">` : profileMatchedObj.displayName.substring(0,2).toUpperCase();
            
            container.innerHTML = `
                <div class="search-result-card">
                    <div style="width:50px; height:50px; border-radius:50%; background:linear-gradient(135deg, #00d2ff, #0055ff); display:flex; justify-content:center; align-items:center; margin:0 auto 10px auto; font-weight:600; color:#fff; overflow:hidden;">${cardImgNode}</div>
                    <h4 style="margin:0; color:#fff; font-size:15px;">${profileMatchedObj.displayName}</h4>
                    <p style="margin:2px 0 8px 0; font-size:12px; color:var(--neon-blue);">@${profileMatchedObj.username}</p>
                    <p style="margin:0; font-size:12px; color:#94a3b8; word-break:break-word;">${profileMatchedObj.bio}</p>
                </div>
            `;
        } else {
            container.innerHTML = `<p style="font-size:13px; color:#64748b; text-align:center; margin-top:20px;">No result found for "${queryRaw}"</p>`;
        }
    }

    // Profile Modals Configurations Switchers
    function displayProfileConfigurator() {
        document.getElementById('dashboardScreen').classList.add('hidden');
        document.getElementById('appNavbar').classList.add('hidden');
        document.getElementById('editProfileScreen').classList.remove('hidden');
        document.getElementById('editError').innerText = "";

        const currentCachedData = JSON.parse(localStorage.getItem(`bubble_db_user_${operatingUserKey}`));
        document.getElementById('editName').value = currentCachedData.displayName;
        document.getElementById('editUsername').value = currentCachedData.username;
        document.getElementById('editPassword').value = currentCachedData.password;
        document.getElementById('editBio').value = currentCachedData.bio;
        temporaryEditBase64Image = currentCachedData.image || ""; // Keep persistent tracking active
    }

    function dismissEditScreen() {
        document.getElementById('editProfileScreen').classList.add('hidden');
        document.getElementById('dashboardScreen').classList.remove('hidden');
        document.getElementById('appNavbar').classList.remove('hidden');
        switchActiveTab('profile', document.querySelectorAll('.nav-item')[3]);
    }

    function commitProfileChanges() {
        const targetName = document.getElementById('editName').value.trim();
        const targetUser = document.getElementById('editUsername').value.trim().toLowerCase();
        const targetPass = document.getElementById('editPassword').value;
        const targetBio = document.getElementById('editBio').value.trim();
        const errNode = document.getElementById('editError');
        errNode.innerText = "";

        if (!targetName) return errNode.innerText = "Error: Display Name cannot be empty!";
        if (!lowerCaseAlphaRegex.test(targetUser) || targetUser.length < 2 || targetUser.length > 10) {
            return errNode.innerText = "Error: Username must be 2-10 letters (Small alphabets ONLY)!";
        }
        if (!targetPass) return errNode.innerText = "Error: Password field required!";

        // Overlapping Username Allocation Safeguards
        if (targetUser !== operatingUserKey) {
            if (localStorage.getItem(`bubble_db_user_${targetUser}`) !== null) {
                return errNode.innerText = "Error: This target username is already assigned!";
            }
            // Purge historical pointer nodes from cache store
            localStorage.removeItem(`bubble_db_user_${operatingUserKey}`);
        }

        const consolidatedProfileSchema = {
            username: targetUser, password: targetPass, displayName: targetName,
            bio: targetBio || "Active on Bubble Net Platform.", image: temporaryEditBase64Image
        };

        // Inject modifications into DB store
        localStorage.setItem(`bubble_db_user_${targetUser}`, JSON.stringify(consolidatedProfileSchema));
        
        // Stabilize system runtime environment keys
        operatingUserKey = targetUser;
        localStorage.setItem('active_bubble_session', targetUser);
        
        // Exit screen safely and clear pointers
        document.getElementById('globalTag').innerText = `@${targetUser}`;
        dismissEditScreen();
    }

    // Action Sheets Handlers Pipeline Configuration
    function revealActionSheet() { document.getElementById('photoSheet').classList.add('open'); }
    function hideActionSheet() { document.getElementById('photoSheet').classList.remove('open'); }
    function triggerDeviceGallery() { document.getElementById('deviceGalleryInput').click(); }

    function processSelectedImage(evt) {
        const imgFile = evt.target.files[0];
        if (imgFile) {
            const streamReader = new FileReader();
            streamReader.onload = function(e) {
                const b64DataStr = e.target.result;
                temporaryEditBase64Image = b64DataStr; // Sync with runtime local configuration cache

                // Update deep storage layer right away so state transitions are persistent
                const rawDb = localStorage.getItem(`bubble_db_user_${operatingUserKey}`);
                if (rawDb) {
                    const parsed = JSON.parse(rawDb);
                    parsed.image = b64DataStr;
                    localStorage.setItem(`bubble_db_user_${operatingUserKey}`, JSON.stringify(parsed));
                }

                // Smoothly patch current DOM graphics node layout pipeline
                const profileImgContainer = document.getElementById('profileViewAvatarNode');
                if (profileImgContainer) {
                    profileImgContainer.innerHTML = `<img src="${b64DataStr}">`;
                }
                hideActionSheet();
            };
            streamReader.readAsDataURL(imgFile);
        }
    }

    function purgeAvatarGraphic() {
        temporaryEditBase64Image = "";
        const rawDb = localStorage.getItem(`bubble_db_user_${operatingUserKey}`);
        if (rawDb) {
            const parsed = JSON.parse(rawDb);
            parsed.image = "";
            localStorage.setItem(`bubble_db_user_${operatingUserKey}`, JSON.stringify(parsed));
        }

        const profileImgContainer = document.getElementById('profileViewAvatarNode');
        if (profileImgContainer) {
            const currentCachedData = JSON.parse(rawDb);
            profileImgContainer.innerHTML = currentCachedData.displayName.substring(0,2).toUpperCase();
        }
        hideActionSheet();
    }
</script>

</body>
</html>
