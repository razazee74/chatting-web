<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Chat Hub</title>
    <style>
        :root {
            --bg-color: #060b13;
            --card-bg: #0f172a;
            --neon-blue: #00d2ff;
            --neon-glow: 0 0 15px rgba(0, 210, 255, 0.4);
            --text-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 1-Second Neon Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 210, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--neon-blue);
            animation: spin 1s linear infinite;
            box-shadow: var(--neon-glow);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Login & Chat Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 30px;
            border-radius: 16px;
            width: 340px;
            box-shadow: var(--neon-glow);
            text-align: center;
            box-sizing: border-box;
        }

        h2, h3 {
            margin-top: 0;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px rgba(0, 210, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d2ff, #0066ff);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.4);
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.6);
        }

        .error-msg {
            color: #ff4a4a;
            font-size: 12px;
            margin-top: 10px;
            min-height: 18px;
        }

        .hidden {
            display: none !important;
        }

        /* P2P System Styles */
        textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            border-radius: 6px;
            padding: 8px;
            resize: none;
            font-size: 11px;
            box-sizing: border-box;
        }
        
        #chatBox {
            height: 220px;
            background: #030712;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 12px;
            overflow-y: auto;
            margin-bottom: 12px;
            text-align: left;
        }

        .msg { margin-bottom: 8px; font-size: 14px; word-break: break-all; }
        .me { color: var(--neon-blue); font-weight: bold; }
        .friend { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div id="loginCard" class="card">
        <h2>PORTAL LOGIN</h2>
        <div class="input-group">
            <label for="username">Your Name (2-10 Letters)</label>
            <input type="text" id="username" placeholder="Enter name..." autocomplete="off">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password...">
        </div>
        <button onclick="handleAuth()">Access Chat</button>
        <div id="errorBox" class="error-msg"></div>
    </div>

    <div id="chatDashboard" class="card hidden" style="width: 450px;">
        <h3 id="welcomeUser">Welcome</h3>
        
        <div id="p2pSetup" style="border-bottom: 1px solid #1e293b; margin-bottom: 15px; padding-bottom: 15px;">
            <div style="margin-bottom: 10px;">
                <button onclick="generateRoomCode()" style="background: #1e293b; border: 1px solid var(--neon-blue); box-shadow: none; font-size: 12px; padding: 6px;">1. Generate My Code</button>
                <textarea id="myCode" rows="2" readonly placeholder="Aapka secret code yahan aayega..."></textarea>
            </div>
            <div>
                <textarea id="friendCode" rows="2" placeholder="Dost ka code yahan paste karein..."></textarea>
                <button onclick="connectToFriend()" style="background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); margin-top: 5px; padding: 8px;">2. Connect to Friend</button>
            </div>
        </div>

        <div id="actualChat" class="hidden">
            <div id="chatBox"></div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="msgBox" placeholder="Type neon message..." onkeypress="if(event.key === 'Enter') sendNeonMessage()">
                <button onclick="sendNeonMessage()" style="width: auto; padding: 0 20px;">Send</button>
            </div>
        </div>
    </div>

<script>
    let currentUsername = "";

    // 1. Force Loading Screen for exactly 1 second on start/refresh
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.classList.add('hidden'), 400);
        }, 1000);
    });

    // 2. Authentication Logic (Signup / Login Custom Controller)
    function handleAuth() {
        const nameInput = document.getElementById('username').value.trim();
        const passInput = document.getElementById('password').value;
        const errorBox = document.getElementById('errorBox');
        
        errorBox.innerText = ""; // clear previous errors

        // Rule Check: Name length boundary (2 to 10 characters)
        if (nameInput.length < 2 || nameInput.length > 10) {
            errorBox.innerText = "Error: Name must be between 2 and 10 letters!";
            return;
        }

        if (!passInput) {
            errorBox.innerText = "Error: Password cannot be empty!";
            return;
        }

        // Local Database Management (via localStorage keys)
        const savedPassword = localStorage.getItem(`user_pass_${nameInput.toLowerCase()}`);

        if (savedPassword === null) {
            // Case A: Username doesn't exist, Registering as New Account
            localStorage.setItem(`user_pass_${nameInput.toLowerCase()}`, passInput);
            initializeSession(nameInput);
        } else {
            // Case B: Username exists, Attempting Login Verification
            if (savedPassword === passInput) {
                initializeSession(nameInput);
            } else {
                errorBox.innerText = "Error: Incorrect password for this username!";
            }
        }
    }

    function initializeSession(username) {
        currentUsername = username;
        document.getElementById('loginCard').classList.add('hidden');
        document.getElementById('chatDashboard').classList.remove('hidden');
        document.getElementById('welcomeUser').innerText = `⚡ Session: ${username}`;
    }


    // ==========================================
    // 3. P2P WebRTC Core Engine (Serverless Sync)
    // ==========================================
    const p2pEngine = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    let communicationChannel;

    p2pEngine.onicecandidate = e => {
        if (!e.candidate) {
            document.getElementById('myCode').value = btoa(JSON.stringify(p2pEngine.localDescription));
        }
    };

    p2pEngine.ondatachannel = e => {
        communicationChannel = e.channel;
        bindChannelEvents();
    };

    async function generateRoomCode() {
        communicationChannel = p2pEngine.createDataChannel("neon_sync");
        bindChannelEvents();
        const offer = await p2pEngine.createOffer();
        await p2pEngine.setLocalDescription(offer);
    }

    async function connectToFriend() {
        const incomingRaw = document.getElementById('friendCode').value.trim();
        if (!incomingRaw) return alert("Please paste your friend's handshake token first.");
        
        try {
            const parsedToken = new RTCSessionDescription(JSON.parse(atob(incomingRaw)));
            await p2pEngine.setRemoteDescription(parsedToken);

            if (parsedToken.type === 'offer') {
                const answer = await p2pEngine.createAnswer();
                await p2pEngine.setLocalDescription(answer);
            }
        } catch (err) {
            alert("Invalid connection token configuration.");
        }
    }

    function bindChannelEvents() {
        communicationChannel.onopen = () => {
            document.getElementById('p2pSetup').classList.add('hidden');
            document.getElementById('actualChat').classList.remove('hidden');
        };
        communicationChannel.onmessage = e => {
            const package = JSON.parse(e.data);
            renderMessage(package.sender, package.msg, 'friend');
        };
    }

    function sendNeonMessage() {
        const msgBox = document.getElementById('msgBox');
        const text = msgBox.value.trim();
        if (!text || !communicationChannel || communicationChannel.readyState !== "open") return;

        const packet = { sender: currentUsername, msg: text };
        communicationChannel.send(JSON.stringify(packet));
        renderMessage('You', text, 'me');
        msgBox.value = '';
    }

    function renderMessage(senderName, messageText, contextClass) {
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML += `<div class="msg"><span class="${contextClass}">${senderName}:</span> ${messageText}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
